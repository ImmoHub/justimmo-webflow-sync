name: Justimmo → Webflow Sync (stündlich)
on:
  schedule:
    # Stündlich zur vollen Stunde
    - cron: '0 * * * *'
  # Manuell ausführbar über GitHub UI
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Abhängigkeiten installieren
        run: pip install requests
      - name: Justimmo → Webflow Sync ausführen
        env:
          JUSTIMMO_USER: ${{ secrets.JUSTIMMO_USER }}
          JUSTIMMO_PASS: ${{ secrets.JUSTIMMO_PASS }}
          WEBFLOW_TOKEN: ${{ secrets.WEBFLOW_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python sync.py
      - name: Log ausgeben
        if: always()
        run: cat sync.log || echo "Kein Log vorhanden"
